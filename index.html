<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactiu GAL i GALP </title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #mapa { height: 100vh; width: 100%; } /* Ocupa tota la pantalla */
        
        /* Estils personalitzats pels popups per distingir-los visualment */
        .popup-gal h3 { color: #859198; margin-bottom: 5px; }
        .popup-galp h3 { color: #1F78D1; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="mapa"></div>

    <script>
        // 1. Inicialitzar el mapa
        var map = L.map('mapa').setView([41.59, 1.6], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // ==========================================
        // 2. CONFIGURACIÓ DE COLORS I ESTILS
        // ==========================================
        
        // Paletes de colors
        const colorsGAL = ['#B1D75B', '#DED845', '#859198', '#C3CFD6'];
        const colorsGALP = ['#8FCBFF', '#4AA3F0', '#1F78D1', '#184A8B'];

        let indexGAL = 0;
        let indexGALP = 0;

        // Funció per donar estil a la capa GAL (Colors que es repeteixen)
        function estilGAL(feature) {
            let colorActual = colorsGAL[indexGAL % colorsGAL.length]; // El % fa que torni al principi si s'acaben els colors
            indexGAL++;
            return {
                fillColor: colorActual,
                weight: 2,
                opacity: 1,
                color: 'white', // Vora blanca com al Choropleth
                dashArray: '3',
                fillOpacity: 0.7
            };
        }

        // Funció per donar estil a la capa GALP (Colors únics per a cadascun)
        function estilGALP(feature) {
            let colorActual = colorsGALP[indexGALP];
            if (!colorActual) colorActual = '#000000'; // Per si hi ha més de 4 GALPs i falten colors
            indexGALP++;
            return {
                fillColor: colorActual,
                weight: 2,
                opacity: 1,
                color: 'white',
                dashArray: '3',
                fillOpacity: 0.8 // Una mica més opac per diferenciar
            };
        }

        // ==========================================
        // 3. EFECTES HOVER (Ressaltar polígons)
        // ==========================================

        function ressaltarFeature(e) {
            var layer = e.target;
            layer.setStyle({
                weight: 5,
                color: '#666',
                dashArray: '',
                fillOpacity: 0.9
            });
            layer.bringToFront(); // Fa que la vora no quedi tapada pels polígons del costat
        }

        // Funcions per restaurar l'estil quan el ratolí marxa
        function restaurarEstilGAL(e) {
            capaGAL.resetStyle(e.target);
        }

        function restaurarEstilGALP(e) {
            capaGALP.resetStyle(e.target);
        }

        // ==========================================
        // 4. CONFIGURACIÓ DELS POPUPS DIFERENTS
        // ==========================================

        function onEachFeatureGAL(feature, layer) {
            // Obtenim les dades (adapta 'nom' i 'web' a les teves columnes de QGIS)
            let nom = feature.properties.GAL || feature.properties.NOM || "Gal";
            let web = feature.properties.pag_web || feature.properties.WEB || "#";
            
            // Disseny exclusiu pel GAL
            let popupContent = `<div class="popup-gal">
                                    <h3> Grup d'Acció Local </h3>
                                    <strong>${nom}</strong><br><br>`;
            if (web !== "#") popupContent += `<a href="${web}" target="_blank">🌐 Visitar pàgina web</a>`;
            popupContent += `</div>`;

            layer.bindPopup(popupContent);

            // Afegim els esdeveniments del ratolí
            layer.on({
                mouseover: ressaltarFeature,
                mouseout: restaurarEstilGAL
            });
        }

        function onEachFeatureGALP(feature, layer) {
            // Obtenim les dades
            let nom = feature.properties.GALP || feature.properties.NOM || "Nom GALP desconegut";
            let web = feature.properties.pag_web || feature.properties.WEB || "#";
            
            // Disseny exclusiu pel GALP
            let popupContent = `<div class="popup-galp">
                                    <h3>⚓ Grup d'Acció Local Pesquer</h3>
                                    <strong>${nom}</strong><br>
                                    <p>Grup d'Acció Local Pesquer</p>`;
            if (web !== "#") popupContent += `<a href="${web}" target="_blank">🌐 Visitar pàgina web</a>`;
            popupContent += `</div>`;

            layer.bindPopup(popupContent);

            // Afegim els esdeveniments del ratolí
            layer.on({
                mouseover: ressaltarFeature,
                mouseout: restaurarEstilGALP
            });
        }

        // ==========================================
        // 5. CARREGAR LES DADES
        // ==========================================

        let capaGAL;
        let capaGALP;

        // Carregar GAL
        fetch('gal_data.geojson')
            .then(response => response.json())
            .then(data => {
                capaGAL = L.geoJSON(data, {
                    style: estilGAL,
                    onEachFeature: onEachFeatureGAL
                }).addTo(map);
            })
            .catch(err => console.error("Error carregant GAL:", err));

        // Carregar GALP
        fetch('galp_data.geojson')
            .then(response => response.json())
            .then(data => {
                capaGALP = L.geoJSON(data, {
                    style: estilGALP,
                    onEachFeature: onEachFeatureGALP
                }).addTo(map);
            })
            .catch(err => console.error("Error carregant GALP:", err));

    </script>
</body>
</html>
